<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PG Social - A responsive social meida website using HTML CSS and JS.
    </title>
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <div class="nav">
        <div class="container">
            <h2>PG Social</h2>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" class="type" placeholder="search here for post">
            </div>
            <div class="create">
                <label class="btn btn-primary" for="create-post">Create</label>
                <div class="profile-nav">
                    <img src="/images/profile-1.jpg" alt="">
                </div>
            </div>
        </div>
    </div>
    <!-- ********************************* MAIN **************************** -->
    <main>
        <div class="main-container">
            <div class="left">
                <a class="profile">
                    <div class="profile-photo">
                        <img src="/images/profile-1.jpg" alt="">
                    </div>
                    <div class="handle">
                        <h4>Payal</h4>
                        <p class="text-muted">@payal</p>
                    </div>
                </a>
            </div>
            <div class="sidebar">
                <a class="menu-item">
                    <span><i class="fas fa-home"></i></span>
                    <h3>Home</h3>
                    <span><i class="fas fa-search"></i></span>
                    <h3>Explore</h3>
                    <span><i class="fas fa-bell"></i> </span>
                    <h3>Notification</h3>
                    <span><i class="fas fa-message"></i></span>
                    <h3>Messages</h3>
                    <span><i class="fas fa-book"></i></span>
                    <h3>Bookmarks</h3>
                    <span><i class="fas fa-home"></i></span>
                    <h3>Anaylatics</h3>
                    <span><i class="fas fa-"></i></span>
                    <h3>Theme</h3>
                    <span><i class="fas fa-setting"></i></span>
                    <h3>Settings</h3>
                </a>
            </div>
            <div class="middel">
                mid box
            </div>
            <div class="right">
                right box
            </div>
        </div>
    </main>
</body>

</html>
